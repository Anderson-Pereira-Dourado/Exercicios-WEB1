<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Formulário BYD</title>
</head>

<body>

<form>

<fieldset>
<legend>Dados Pessoais</legend>

<label>Nome:</label><br>
<input type="text" placeholder="Nome completo" required><br><br>

<label>Email:</label><br>
<input type="email" placeholder="Digite seu email"><br><br>

<label>Telefone:</label><br>
<input type="tel" placeholder="(XX)XXXXX-XXXX"><br><br>

<label>Crie uma senha:</label><br>
<input type="password" placeholder="Digite sua senha"><br><br>

<label>Idade:</label><br>
<input type="number" placeholder="Sua idade"><br><br>

<label>Estado de entrega:</label><br>

<select>
<option>Selecione seu estado</option>

<optgroup label="Norte">
<option>Acre</option>
<option>Amapá</option>
<option>Amazonas</option>
<option>Pará</option>
<option>Rondônia</option>
<option>Roraima</option>
<option>Tocantins</option>
</optgroup>

<optgroup label="Nordeste">
<option>Alagoas</option>
<option>Bahia</option>
<option>Ceará</option>
<option>Maranhão</option>
<option>Paraíba</option>
<option>Pernambuco</option>
<option>Piauí</option>
<option>Rio Grande do Norte</option>
<option>Sergipe</option>
</optgroup>

<optgroup label="Centro-Oeste">
<option>Distrito Federal</option>
<option>Goiás</option>
<option>Mato Grosso</option>
<option>Mato Grosso do Sul</option>
</optgroup>

<optgroup label="Sudeste">
<option>Espírito Santo</option>
<option>Minas Gerais</option>
<option>Rio de Janeiro</option>
<option>São Paulo</option>
</optgroup>

<optgroup label="Sul">
<option>Paraná</option>
<option>Santa Catarina</option>
<option>Rio Grande do Sul</option>
</optgroup>

</select><br><br>

<label>Foto da CNH:</label><br>
<input type="file">

</fieldset>


<fieldset>
<legend>Escolha do Carro</legend>

<input type="radio" name="carro">
BYD Seal<br>

<input type="radio" name="carro">
BYD Han<br>

<input type="radio" name="carro">
BYD Song Plus<br><br>

Itens adicionais:<br>

<input type="checkbox"> Som Premium<br>
<input type="checkbox"> Ar-condicionado Digital<br>
<input type="checkbox"> Câmera 360°<br><br>

Cor:
<input type="color"><br><br>

Intensidade:
<input type="range">

</fieldset>


<fieldset>
<legend>Entrega</legend>

Data:
<input type="date"><br><br>

Hora:
<input type="time"><br><br>

Mês:
<input type="month">

</fieldset>


<fieldset>
<legend>Sua Opinião</legend>

<textarea rows="5" cols="50"
placeholder="Digite sua opinião aqui">
</textarea>

</fieldset>


<fieldset>
<legend>Avaliação</legend>

BYD Dolphin Plus:
<input type="number" min="0" max="5" placeholder="0 a 5"><br><br>

BYD GS:
<input type="number" min="0" max="5" placeholder="0 a 5"><br><br>

BYD Mini:
<input type="number" min="0" max="5" placeholder="0 a 5">

</fieldset>

<br>

<input type="submit" value="Enviar">
<input type="reset" value="Limpar">

</form>

</body>
</html>
